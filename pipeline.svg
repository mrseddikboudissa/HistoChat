<svg width="100%" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- background -->
<rect width="680" height="900" fill="#ffffff"/>

<!-- TITLE -->
<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">HistoChat — system pipeline</text>

<!-- USER -->
<rect x="260" y="52" width="160" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="78" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">User</text>

<!-- arrow -->
<line x1="340" y1="96" x2="340" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="116" font-size="12" fill="#5f5e5a">message + optional image / PDF</text>

<!-- FRONTEND -->
<rect x="220" y="126" width="240" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="150" text-anchor="middle" font-size="14" font-weight="500" fill="#26215c">Frontend</text>
<text x="340" y="168" text-anchor="middle" font-size="12" fill="#3c3489">HTML · CSS · JavaScript</text>

<!-- arrow -->
<line x1="340" y1="182" x2="340" y2="212" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="202" font-size="12" fill="#5f5e5a">FormData (prompt + file)</text>

<!-- FLASK -->
<rect x="220" y="212" width="240" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="340" y="236" text-anchor="middle" font-size="14" font-weight="500" fill="#04342c">Flask backend</text>
<text x="340" y="254" text-anchor="middle" font-size="12" fill="#085041">Route: /chatbot · detects mode</text>

<!-- left branch: image -->
<path d="M220 240 L120 240 L120 340" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="60" y="295" text-anchor="middle" font-size="12" fill="#5f5e5a">image</text>
<text x="60" y="308" text-anchor="middle" font-size="12" fill="#5f5e5a">attached</text>

<!-- right branch: PDF -->
<path d="M460 240 L560 240 L560 340" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="612" y="295" text-anchor="middle" font-size="12" fill="#5f5e5a">PDF</text>
<text x="612" y="308" text-anchor="middle" font-size="12" fill="#5f5e5a">attached</text>

<!-- center branch: text only -->
<line x1="340" y1="268" x2="340" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="352" y="310" font-size="12" fill="#5f5e5a">text only</text>

<!-- IMAGE PATH: BLIP-2 -->
<rect x="40" y="340" width="160" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="120" y="364" text-anchor="middle" font-size="14" font-weight="500" fill="#4a1b0c">BLIP-2</text>
<text x="120" y="382" text-anchor="middle" font-size="12" fill="#712b13">VQA captioning</text>

<!-- TEXT PATH: Mistral -->
<rect x="220" y="340" width="240" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="364" text-anchor="middle" font-size="14" font-weight="500" fill="#26215c">Mistral 7B</text>
<text x="340" y="382" text-anchor="middle" font-size="12" fill="#3c3489">Instruct · conversational chat</text>

<!-- RAG PATH -->
<rect x="480" y="340" width="160" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="560" y="364" text-anchor="middle" font-size="14" font-weight="500" fill="#042c53">RAG pipeline</text>
<text x="560" y="382" text-anchor="middle" font-size="12" fill="#0c447c">PDF · chunk · embed</text>

<!-- RAG sub-steps -->
<line x1="560" y1="396" x2="560" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="480" y="430" width="160" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="560" y="454" text-anchor="middle" font-size="14" font-weight="500" fill="#042c53">Vector store</text>
<text x="560" y="472" text-anchor="middle" font-size="12" fill="#0c447c">FAISS similarity search</text>

<line x1="560" y1="486" x2="560" y2="520" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="480" y="520" width="160" height="56" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text x="560" y="544" text-anchor="middle" font-size="14" font-weight="500" fill="#042c53">Retrieved chunks</text>
<text x="560" y="562" text-anchor="middle" font-size="12" fill="#0c447c">Top-k relevant passages</text>

<!-- RAG feeds Mistral -->
<path d="M480 548 L420 548 L420 430 L460 430" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="432" y="495" text-anchor="middle" font-size="12" fill="#5f5e5a">context</text>

<!-- BLIP caption feeds Mistral -->
<path d="M200 368 L220 368" fill="none" stroke="#993c1d" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="210" y="358" font-size="12" fill="#5f5e5a">caption</text>

<!-- CONVERSATION HISTORY -->
<rect x="220" y="440" width="240" height="56" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text x="340" y="464" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">Conversation history</text>
<text x="340" y="482" text-anchor="middle" font-size="12" fill="#633806">Last N turns · rolling context</text>

<!-- history feeds Mistral -->
<line x1="340" y1="440" x2="340" y2="396" stroke="#854f0b" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Mistral output arrow -->
<line x1="340" y1="396" x2="340" y2="560" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- FLASK RESPONSE -->
<rect x="220" y="560" width="240" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="340" y="584" text-anchor="middle" font-size="14" font-weight="500" fill="#04342c">Flask response</text>
<text x="340" y="602" text-anchor="middle" font-size="12" fill="#085041">Plain text · sent back to frontend</text>

<line x1="340" y1="616" x2="340" y2="646" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- FRONTEND RENDERS -->
<rect x="220" y="646" width="240" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="340" y="670" text-anchor="middle" font-size="14" font-weight="500" fill="#26215c">Frontend renders</text>
<text x="340" y="688" text-anchor="middle" font-size="12" fill="#3c3489">Chat bubble · avatar · animation</text>

<line x1="340" y1="702" x2="340" y2="732" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- USER SEES RESPONSE -->
<rect x="260" y="732" width="160" height="44" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="758" text-anchor="middle" font-size="14" font-weight="500" fill="#2c2c2a">User sees response</text>

<!-- LEGEND -->
<line x1="44" y1="820" x2="80" y2="820" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="88" y="824" font-size="12" fill="#5f5e5a">main flow</text>
<line x1="180" y1="820" x2="216" y2="820" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="224" y="824" font-size="12" fill="#5f5e5a">data passed between models</text>
</svg>
